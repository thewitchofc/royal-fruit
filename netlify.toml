[build]
  publish = "dist"
  command = "npm run build"
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# SPA: אל תשמרו את דף הכניסה זמן רב — אחרת דפדפן/CDN מחזיקים הפניה ל-CSS/JS ישנים.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, private, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, private, must-revalidate"

# קבצים עם hash מ-Vite — בטוח לשמור שנים (שם הקובץ משתנה בכל build)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# תמונות קטלוג בלי שם קובץ משתנה — מניעת «עדכון שלא נראה» בגלל CDN/דפדפן
[[headers]]
  for = "/images/catalog/*"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=86400"

# רקע מלא + לוגו — נתיבים יציבים; חוסך חזרות במובייל (מגביר מכסת מטמון CDN)
[[headers]]
  for = "/images/backgrounds/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/images/brand/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
