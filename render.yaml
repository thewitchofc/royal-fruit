# Render.com — אתר SPA + פרוקסי מחירון ב־/price-sheet.csv
# https://render.com/docs/blueprint-spec
# הערה: netlify.toml לא חל כאן — מטמון לקבצים סטטיים מוגדר ב־server.mjs
services:
  - type: web
    name: royal-fruit-premium
    runtime: node
    plan: free
    region: frankfurt # או מאזור אחר קרוב ללקוחות
    buildCommand: npm ci && npm run build
    startCommand: node server.mjs
    envVars:
      - key: NODE_VERSION
        value: "20.11.1"
      # בשלב ה-Build ובזמן ריצה: כתובת האתר (sitemap.xml, robots, OG) — ללא סלאש בסוף.
      # אם השירות נוצר ידנית בלי Blueprint: הוסיפו את אותו משתנה ב-Dashboard → Environment.
      - key: VITE_SITE_URL
        value: "https://royalfruit.co.il"
      # ב-Build בלבד: המחירון נטען מ־/price-sheet.csv (אותו דומיין)
      - key: VITE_PRICE_SHEET_VIA_PROXY
        value: "1"
      # אופציונלי: קישור מלא לטופס ביקורת או VITE_GOOGLE_BUSINESS_PLACE_ID — ראו .env.example
      - key: VITE_GOOGLE_WRITE_REVIEW_URL
        sync: false
      - key: VITE_GOOGLE_BUSINESS_PLACE_ID
        sync: false
      # בזמן ריצה של server.mjs: כתובת ה-CSV מהגוגל שיטס (לא חובה למסור ל-VITE_)
      - key: GOOGLE_SHEETS_PRODUCTS_CSV_URL
        sync: false
