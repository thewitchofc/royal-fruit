<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="b_fdR8hYJppa83gHzGCNF30yVj_2gveEgnNXBFsnKC4" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/images/brand/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/images/brand/favicon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/brand/apple-touch-icon.png" />
    <meta name="theme-color" content="#21650c" />
    <!-- לוגו גדול בכותרת דסקטופ בלבד — במובייל משתמשים בגרסה מוקטנת -->
    <link
      rel="preload"
      as="image"
      href="/images/brand/brand-logo.png"
      type="image/png"
      media="(min-width: 961px)"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="image"
      href="/images/brand/brand-logo-mobile.png"
      type="image/png"
      media="(max-width: 960px)"
      fetchpriority="high"
    />
    <!-- דסקטופ: רקע פירות כבד — טעינה מוקדמת לשיפור LCP/FCP (תואם ל־image-set ב־.app-shell::before) -->
    <link
      rel="preload"
      as="image"
      href="/images/backgrounds/header-fruits-bg-mobile.avif"
      type="image/avif"
      media="(min-width: 961px)"
      fetchpriority="high"
    />
    <!-- רק AVIF — תואם ל־image-set ב-CSS; מניעת טעינה כפולה של WebP+AVIF במובייל -->
    <link
      rel="preload"
      as="image"
      href="/images/backgrounds/header-fruits-bg-mobile.avif"
      type="image/avif"
      media="(max-width: 960px)"
      fetchpriority="high"
    />
    <meta
      name="description"
      content="Royal Fruit, משלוח פירות וירקות טריים עד הבית. מוצרים קלופים, מארזים והמלצות לקוחות. איכות גבוהה, אספקה יומית ומענה מהיר בוואטסאפ. לבית ולעסקים."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Royal Fruit" />
    <meta
      property="og:title"
      content="Royal Fruit | פירות וירקות טריים עד הבית, משלוחים יומיים"
    />
    <meta
      property="og:description"
      content="Royal Fruit, משלוח פירות וירקות טריים עד הבית. מוצרים קלופים, מארזים והמלצות לקוחות. איכות גבוהה, אספקה יומית ומענה מהיר בוואטסאפ."
    />
    <meta property="og:locale" content="he_IL" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Royal Fruit | פירות וירקות טריים עד הבית, משלוחים יומיים</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      fetchpriority="high"
      href="https://fonts.gstatic.com/s/heebo/v28/NGS6v5_NC0k9P9H0TbFhsqMA6aw.woff2"
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="https://fonts.gstatic.com/s/heebo/v28/NGS6v5_NC0k9P9H2TbFhsqMA.woff2"
    />
    <!-- טעינת פונטים לא חוסמת רינדור (משפר TBT / Speed Index); noscript לסוכנים בלי JS -->
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <!-- מסך טעינה לפני React — נעלם כשהאפליקציה נטענת (מחליף את תוכן #root) -->
    <style>
      #initial-app-loader {
        box-sizing: border-box;
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        font-family:
          "Heebo",
          system-ui,
          -apple-system,
          Segoe UI,
          sans-serif;
        background: linear-gradient(180deg, #f8fdf4 0%, #eef6e8 55%, #e8f2e0 100%);
        color: #3d5238;
      }
      #initial-app-loader .initial-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
        text-align: center;
      }
      #initial-app-loader .initial-spin {
        position: relative;
        width: 3rem;
        height: 3rem;
      }
      #initial-app-loader .initial-spinner {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2.5px solid rgba(33, 101, 12, 0.14);
        border-top-color: #21650c;
        border-right-color: rgba(211, 164, 71, 0.75);
        animation: initial-app-spin 1s linear infinite;
      }
      #initial-app-loader .initial-spinner-inner {
        position: absolute;
        inset: 0.42rem;
        border-radius: 50%;
        border: 2px solid rgba(33, 101, 12, 0.1);
        border-bottom-color: rgba(211, 164, 71, 0.85);
        border-left-color: rgba(33, 101, 12, 0.55);
        animation: initial-app-spin 0.75s linear infinite reverse;
      }
      #initial-app-loader .initial-text {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 600;
        opacity: 0.85;
      }
      @keyframes initial-app-spin {
        to {
          transform: rotate(-360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #initial-app-loader .initial-spinner,
        #initial-app-loader .initial-spinner-inner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-app-loader" role="status" aria-live="polite" aria-busy="true">
        <div class="initial-inner">
          <div class="initial-spin" aria-hidden="true">
            <span class="initial-spinner"></span>
            <span class="initial-spinner-inner"></span>
          </div>
          <p class="initial-text">טוען את האתר…</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
